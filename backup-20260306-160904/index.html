<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documentos App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="grey lighten-4">
    <nav class="teal darken-2">
      <div class="nav-wrapper container">
        <span class="brand-logo">Documentos</span>
      </div>
    </nav>

    <main class="container page-content">
      <div class="row">
        <section class="col s12 l4">
          <div class="card">
            <div class="card-content">
              <span class="card-title">1) Tipos de Secao</span>

              <form id="secaoForm">
                <input type="hidden" id="secaoId" />

                <div class="input-field">
                  <input id="secaoNome" type="text" required />
                  <label for="secaoNome">Nome da secao</label>
                </div>

                <div class="action-row">
                  <button type="submit" class="btn waves-effect waves-light">Salvar Secao</button>
                  <button type="button" id="secaoCancelBtn" class="btn-flat">Cancelar</button>
                </div>
              </form>

              <ul id="secoesList" class="collection app-list"></ul>
            </div>
          </div>
        </section>

        <section class="col s12 l4">
          <div class="card">
            <div class="card-content">
              <span class="card-title">2) Atributos por Documento Tipo</span>

              <form id="atributoForm">
                <input type="hidden" id="atributoId" />

                <div class="input-field">
                  <select id="atributoTipo" required>
                    <option value="tipo_1">Tipo 1</option>
                    <option value="tipo_2">Tipo 2</option>
                  </select>
                  <label for="atributoTipo">Documento Tipo</label>
                </div>

                <div class="input-field">
                  <input id="atributoNome" type="text" required />
                  <label for="atributoNome">Nome do atributo</label>
                </div>

                <div class="input-field">
                  <select id="atributoTipoCampo">
                    <option value="texto">Texto</option>
                    <option value="numero">Numero</option>
                    <option value="data">Data</option>
                    <option value="boolean">Booleano</option>
                  </select>
                  <label for="atributoTipoCampo">Tipo do campo</label>
                </div>

                <div class="input-field">
                  <select id="atributoSecao">
                    <option value="">Sem secao</option>
                  </select>
                  <label for="atributoSecao">Secao</label>
                </div>

                <div class="input-field">
                  <input id="atributoValidador" type="text" placeholder="required, unique, max:10" />
                  <label for="atributoValidador" class="active">Validador (opcional)</label>
                </div>

                <div class="input-field">
                  <input id="atributoPeso" type="number" step="0.01" placeholder="1.5" />
                  <label for="atributoPeso" class="active">Peso (float, opcional)</label>
                </div>

                <div class="input-field">
                  <input id="atributoMascara" type="text" placeholder="99/99/9999" />
                  <label for="atributoMascara" class="active">Mascara (opcional, 9 = coringa)</label>
                </div>

                <div class="action-row">
                  <button type="submit" class="btn waves-effect waves-light">Salvar Atributo</button>
                  <button type="button" id="atributoCancelBtn" class="btn-flat">Cancelar</button>
                </div>
              </form>

              <ul id="atributosList" class="collection app-list"></ul>
            </div>
          </div>
        </section>

        <section class="col s12 l4">
          <div class="card">
            <div class="card-content">
              <span class="card-title">3) Documento</span>

              <form id="documentoForm">
                <input type="hidden" id="documentoId" />

                <div class="input-field">
                  <input id="documentoTitulo" type="text" required />
                  <label for="documentoTitulo">Titulo</label>
                </div>

                <div class="input-field">
                  <select id="documentoTipo" required>
                    <option value="" selected>Selecione...</option>
                    <option value="tipo_1">Tipo 1</option>
                    <option value="tipo_2">Tipo 2</option>
                  </select>
                  <label for="documentoTipo">Documento Tipo</label>
                </div>

                <div id="documentoCampos" class="documento-campos"></div>

                <div class="action-row">
                  <button type="submit" class="btn waves-effect waves-light">Salvar Documento</button>
                  <button type="button" id="documentoCancelBtn" class="btn-flat">Cancelar</button>
                </div>
              </form>

              <ul id="documentosList" class="collection app-list"></ul>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
