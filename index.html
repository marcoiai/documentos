<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documentos App - Tipos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="grey lighten-4">
    <nav class="teal darken-2">
      <div class="nav-wrapper container" style="display:flex;justify-content:space-between;align-items:center;">
        <span class="brand-logo" style="position:static;transform:none;">Documentos</span>
        <div>
          <a href="index.html" class="white-text" style="margin-right:12px;">Tipos</a>
          <a href="secoes.html" class="white-text" style="margin-right:12px;">Secoes</a>
          <a href="atributos.html" class="white-text" style="margin-right:12px;">Atributos</a>
          <a href="documentos.html" class="white-text" style="margin-right:12px;">Documento</a>
          <a href="layout.html" class="white-text">Layout</a>
        </div>
      </div>
    </nav>

    <main class="container page-content">
      <section id="tab-tipos" class="tab-panel" style="display:block;">
        <div class="card">
          <div class="card-content">
            <span class="card-title">0) Documento Tipos</span>

            <form id="tipoForm">
              <input type="hidden" id="tipoId" />
              <div class="input-field">
                <input id="tipoNome" type="text" required />
                <label for="tipoNome">Nome do tipo</label>
              </div>
              <div class="input-field">
                <textarea id="tipoCabecalho" class="materialize-textarea"></textarea>
                <label for="tipoCabecalho">Cabecalho (opcional)</label>
              </div>
              <div class="input-field">
                <textarea id="tipoRodape" class="materialize-textarea"></textarea>
                <label for="tipoRodape">Rodape (opcional)</label>
              </div>
              <div class="action-row">
                <button type="submit" class="btn waves-effect waves-light">Salvar Tipo</button>
                <button type="button" id="tipoCancelBtn" class="btn-flat">Cancelar</button>
              </div>
            </form>

            <div id="tipoSecoesWrap" class="tipo-secoes-wrap">
              <small class="grey-text">Ao editar um tipo, as seções aparecem aqui.</small>
              <ul id="tipoSecoesList" class="collection app-list"></ul>
            </div>

            <ul id="tiposList" class="collection app-list"></ul>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
