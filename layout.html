<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documentos App - Layout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="grey lighten-4">
    <nav class="teal darken-2">
      <div class="nav-wrapper container" style="display:flex;justify-content:space-between;align-items:center;">
        <span class="brand-logo" style="position:static;transform:none;">Documentos</span>
        <div>
          <a href="index.html" class="white-text" style="margin-right:12px;">Tipos</a>
          <a href="secoes.html" class="white-text" style="margin-right:12px;">Secoes</a>
          <a href="atributos.html" class="white-text" style="margin-right:12px;">Atributos</a>
          <a href="documentos.html" class="white-text" style="margin-right:12px;">Documento</a>
          <a href="layout.html" class="white-text">Layout</a>
          <a href="relatorios.html" class="white-text">Relatorios</a>
          <a href="relatorio-layout.html" class="white-text">Layout Relatorio</a>
        </div>
      </div>
    </nav>

    <main class="container page-content">
      <section id="tab-layout" class="tab-panel" style="display:block;">
        <div class="card">
          <div class="card-content">
            <span class="card-title">4) Layout dos Campos</span>

            <div class="row" style="margin-bottom:0;">
              <div class="input-field col s12 m6">
                <select id="layoutTipo"></select>
                <label for="layoutTipo">Documento Tipo</label>
              </div>
              <div class="col s12 m6 layout-reset-wrap">
                <button id="layoutSaveBtn" type="button" class="btn waves-effect waves-light">Salvar Layout</button>
                <button id="layoutResetBtn" type="button" class="btn-flat">Resetar Layout</button>
              </div>
            </div>

            <p class="grey-text text-darken-1">Ajuste a largura e a ordem dos campos.</p>
            <div id="layoutGridEditor" class="layout-grid-editor"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
